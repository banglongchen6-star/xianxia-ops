name: Deploy to Alibaba Cloud

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 15m
          script: |
            cd /home/admin/xianxia-ops
            git pull origin main
            npm install
            npm run build
            pm2 delete xianxia-ops 2>/dev/null || true
            sudo kill -9 $(sudo lsof -t -i:3001) 2>/dev/null || true
            sleep 5
            pm2 start npm --name xianxia-ops --max-restarts 3 -- start -- -p 3001
            pm2 save
            echo "✅ Deploy done"
